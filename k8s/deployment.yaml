apiVersion: apps/v1
kind: Deployment
metadata:
  name: luxe-living-store
  labels:
    app: luxe-living-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: luxe-living-store
  template:
    metadata:
      labels:
        app: luxe-living-store
    spec:
      containers:
        - name: store
          image: luxe-living-store:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: luxe-living-chat-config
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
